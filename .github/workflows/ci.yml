name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .
      - name: Run tests
        run: python tests/test_roundtrip.py
      - name: Verify test vectors
        run: python -c "import json; [json.load(open(f'test-vectors/amem-testvector-00{i}.json')) for i in (1,2)]; print('test vectors OK')"
